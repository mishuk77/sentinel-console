# Railway configuration file
# This file can be committed to git
# DO NOT put secrets here - use Railway CLI or dashboard for secrets

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand removed — set per-service in Railway dashboard:
#   API:    sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'
#   Worker: celery -A app.celery_app:celery_app worker --loglevel=info --pool=solo
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Non-secret environment variables (safe to commit)
[env]
API_V1_STR = "/api/v1"
PROJECT_NAME = "Sentinel Decision Systems"
DEBUG = "false"
ENV = "production"
STORAGE_TYPE = "s3"

# ============================================================
# DO NOT PUT THESE IN THIS FILE (use Railway CLI or dashboard):
# - SECRET_KEY
# - CORS_ORIGINS (contains your actual domain)
# - DATABASE_URL (automatically set by Railway)
# ============================================================
